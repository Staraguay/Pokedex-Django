<div class="d-flex flex-column justify-content-center align-items-center">
    <nav style="height: fit-content">
        <ul class="pagination pagination-lg">
            {% if pagination.has_previous %}
                <li class="page-item"><a class="page-link" href="?page={{ pagination.previous_page_number }}"
                                         onclick="refreshPokeTable()">Anterior</a></li>
            {% endif %}
            <li class="page-item"><a class="page-link" href="?page=1">1</a></li>
            <li class="page-item"><a class="page-link" href="?page=2">2</a></li>
            <li style="background-color: #cbcbcb"><span
                    class="d-flex justify-content-center align-items-center m-3">{{ pagination.number }} de {{ pagination.paginator.num_pages }}</span>
            </li>
            <li class="page-item"><a class="page-link"
                                     href="?page={{ pagination.paginator.num_pages }}">{{ pagination.paginator.num_pages }}</a>
            </li>
            {% if pagination.has_next %}
                <li class="page-item"><a class="page-link" href="?page={{ pagination.next_page_number }}"
                                         onclick="refreshPokeTable()">Siguiente</a></li>
            {% endif %}
        </ul>
    </nav>
</div>
